reference:
  - title: Verbs
    desc: >
      The universal entry, the single-engine pins, the feasibility
      planner, cross-engine triangulation, and approximation validation.
    contents:
      - flexybayes
      - flexybayes_stream
      - fb
      - fb_greta
      - fb_inla
      - fb_brms
      - fb_plan
      - triangulate
      - validate_approximation
      - proceed
  - title: Ingest adapters
    desc: Turn a model specification into a backend-agnostic representation.
    contents:
      - fb_from_asreml
      - fb_from_brms
      - fb_from_greta
  - title: Constructor nouns
    desc: >
      The four classed input constructors: priors, covariance carriers,
      approximation schemes, and engine selections.
    contents:
      - fb_prior
      - fb_cov
      - fb_approx
      - fb_engine
      - is_fb_cov
      - is_fb_approx
      - is_fb_engine
  - title: Accessors and discovery
    desc: Routing trace, refusal vocabulary, canonical names, prior summary, status.
    contents:
      - backend_decision
      - canonical_names
      - fb_backend_status
      - fb_structured_cov
      - fb_refusals
      - prior_summary
      - gretaR_status
      - cat_code
  - title: Cross-package interop
    desc: Tidiers, emmeans, marginaleffects, and draws conversion.
    contents:
      - tidy.flexybayes
      - glance.flexybayes
      - augment.flexybayes
      - emm_basis.flexybayes
      - recover_data.flexybayes
      - get_coef.flexybayes
      - get_vcov.flexybayes
      - get_predict.flexybayes
      - get_data.flexybayes
      - set_coef.flexybayes
      - fb_as_draws_simple
  - title: Methods
    desc: >
      S3 methods on the fit objects. Most are reached through their
      generic (for example `coef()`, `predict()`); they are listed here
      for completeness.
    contents:
      - summary.flexybayes
      - summary.flexybayes_aggregated
      - summary.flexybayes_glm
      - summary.fb_plan
      - print.flexybayes
      - print.flexybayes_aggregated
