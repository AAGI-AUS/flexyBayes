url: https://aagi-aus.github.io/flexyBayes/

template:
  bootstrap: 5
  bootswatch: cosmo

development:
  mode: auto

home:
  title: flexyBayes — Flexible Bayesian mixed models with ASReml and brms-style syntax
  description: >
    Specify mixed models using ASReml-style or brms-style formula syntax,
    estimate them via greta, INLA, or brms (Stan), and triangulate posterior
    agreement across engines as a robustness signal.

navbar:
  structure:
    left:  [intro, reference, articles, tutorials, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/flexyBayes-01-getting-started.html
    articles:
      text: Tutorials
      menu:
        - text: "Foundations"
        - text: 01 — Getting started
          href: articles/flexyBayes-01-getting-started.html
        - text: 02 — asreml-shaped formulas
          href: articles/flexyBayes-02-asreml-formulas.html
        - text: 03 — Foundational regression
          href: articles/flexyBayes-03-regression.html
        - text: "---"
        - text: "Core mixed-model concepts"
        - text: 04 — Hierarchical models
          href: articles/flexyBayes-04-hierarchical.html
        - text: 05 — Structured covariance
          href: articles/flexyBayes-05-structured-covariance.html
        - text: 06 — Priors and regularisation
          href: articles/flexyBayes-06-priors.html
        - text: "---"
        - text: "Applied workflows"
        - text: 07 — METs and genomic selection
          href: articles/flexyBayes-07-met-and-genomics.html
        - text: 08 — Downstream analysis
          href: articles/flexyBayes-08-downstream-analysis.html
        - text: 09 — Spatio-temporal models
          href: articles/flexyBayes-09-spatio-temporal.html
        - text: "---"
        - text: "Advanced & internals"
        - text: 10 — Cross-engine triangulation
          href: articles/flexyBayes-10-triangulation.html
        - text: 11 — LGM feasibility filter
          href: articles/flexyBayes-11-lgm-feasibility.html
        - text: 12 — Backend internals
          href: articles/flexyBayes-12-backend-internals.html
        - text: 14 — Choosing an engine
          href: articles/flexyBayes-14-engine-selection.html
        - text: 15 — Extending with a backend
