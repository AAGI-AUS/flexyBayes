on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs.
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # System libraries for the spatial stack (units / sf). pkgdown runs
      # \donttest examples (which R CMD check skips on CI), and some
      # reference topics load `units`; its shared object needs
      # libudunits2 present on the runner.
      - name: Install spatial system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudunits2-dev libgdal-dev libgeos-dev libproj-dev
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # knitr + rmarkdown are the VignetteBuilder, needed to build
          # local::. (the package) for the pkgdown site.
          extra-packages: any::pkgdown, any::knitr, any::rmarkdown, local::.
          needs: website
          # "hard" stops pak from trying to resolve the special-repo /
          # heavy Suggests (INLA, greta) which fail to solve on CI.
          dependencies: '"hard"'

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
